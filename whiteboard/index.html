<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Whiteboard Mode</title>
    <link rel="stylesheet" href="whiteboard.css">
</head>
<body>
    <div id="rotate-overlay">
        <div class="message">
            🔄 Please rotate to Landscape for the Whiteboard
        </div>
    </div>
    <div id="whiteboard-container">
        <aside class="sidebar">
            <div class="toolbar-section">
                <h3>Colors</h3>
                <div class="color-picker">
                    <button class="color-btn active" data-color="#000000" style="background: #000000;"></button>
                    <button class="color-btn" data-color="#2563eb" style="background: #2563eb;"></button>
                    <button class="color-btn" data-color="#dc2626" style="background: #dc2626;"></button>
                    <button class="color-btn" data-color="#16a34a" style="background: #16a34a;"></button>
                    <button class="color-btn" data-color="#9333ea" style="background: #9333ea;"></button>
                    <button class="color-btn" data-color="#f97316" style="background: #f97316;"></button>
                </div>
                
                <button id="eraser-btn" class="tool-btn">🧽 Eraser</button>
                <button id="clear-canvas" class="tool-btn danger">🗑️ Clear Ink</button>
            </div>

            <div class="absence-management">
                <h3>Benched</h3>
                <ul id="absentee-list">
                    </ul>
            </div>

            <div class="sidebar-footer">
                <a href="../index.html" class="exit-btn">🏠 Exit</a>
            </div>
        </aside>

        <main class="arena">
            <canvas id="drawing-canvas"></canvas>

            <div class="content-overlay">
                <div class="hero-text">
                    <h1 id="student-name">Ready!</h1>
                    <p id="question-text">Select Level to start</p>
                </div>

                <div class="action-bar">
                    <button id="btn-next-student" class="btn-shuffle">🎲 Next Student</button>
                    <button class="btn correct" id="btn-correct">CORRECT</button>
                    <button class="btn incorrect" id="btn-incorrect">INCORRECT</button>
                    <button class="btn absent" id="btn-absent">ABSENT</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="whiteboard.js"></script>
</body>
</html>
