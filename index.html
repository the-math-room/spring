<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Exercise Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-zone">
    <input type="email" id="teacherEmail" placeholder="Email">
    <input type="password" id="teacherPassword" placeholder="Password">
    <button id="loginBtn">Teacher Login</button>
</div>

<div id="teacher-actions" style="display: none; margin-top: 30px;">
    <h2>Dashboard</h2>
    <a href="/whiteboard/index.html" class="launch-btn">
        🚀 Launch Whiteboard Mode (16:9)
    </a>
    <div style="margin-top: 20px;">
        <button id="logoutBtn" class="secondary-btn">Sign Out</button>
    </div>
    <p class="hint">Optimized for electronic whiteboards and touch input.</p>
</div>

    <h1>Classroom Bootloader</h1>
    <p>Status: <span id="connectionStatus">Connecting...</span></p>
    
    <main>
        <button id="testBtn">Submit Attempt</button> 
        <div id="output"></div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
