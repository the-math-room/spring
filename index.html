<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Exercise Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-zone">
        <h1>Teacher Login</h1>
        <input type="email" id="teacherEmail" placeholder="Email">
        <input type="password" id="teacherPassword" placeholder="Password">
        <button id="loginBtn">Sign In</button>
    </div>

    <div id="teacher-actions" style="display: none; margin-top: 30px;">
        <h2>Dashboard</h2>
        <a href="./whiteboard/index.html" class="launch-btn">🚀 Launch Whiteboard</a>
    
        <div style="margin-top: 20px;">
            <button id="resetBtn" class="secondary-btn">🔄 Reset Attendance for New Class</button>
        </div>

        <button id="logoutBtn" class="secondary-btn" style="color: #ef4444;">Sign Out</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
