<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Exercise Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-zone">
        <h1>Teacher Login</h1>
        <input type="email" id="teacherEmail" placeholder="Email">
        <input type="password" id="teacherPassword" placeholder="Password">
        <button id="loginBtn">Sign In</button>
    </div>

    <div id="teacher-actions" style="display: none; margin-top: 30px;">
        <h2>Classroom Dashboard</h2>
        <p>Status: <span id="connectionStatus">Connecting...</span></p>
        
        <div class="dashboard-grid">
            <a href="./whiteboard/index.html" class="launch-btn">
                🚀 Launch Whiteboard Mode
            </a>
            
            <div class="system-check">
                <h3>Pre-Flight Check</h3>
                <div id="output">System initialized.</div>
                <button id="testBtn" style="margin-top:10px; font-size: 0.8rem;">Run Diagnostic Ping</button>
            </div>
        </div>

        <button id="logoutBtn" class="secondary-btn">Sign Out</button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
